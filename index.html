<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عيد ميلاد أسماء</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #12001f, #3b145f, #ff7b8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
    }

    .card {
      width: 85%;
      max-width: 460px;
      padding: 35px 25px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 0 35px rgba(255, 180, 200, 0.45);
      backdrop-filter: blur(12px);
      animation: appear 1.5s ease;
      z-index: 2;
      border: 1px solid rgba(255, 220, 230, 0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 15px;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7);
    }

    .age {
      font-size: 24px;
      color: #ffe08a;
      font-weight: bold;
      text-shadow: 0 0 12px rgba(255, 224, 138, 0.8);
    }

    p {
      font-size: 20px;
      line-height: 1.8;
    }

    button {
      margin-top: 20px;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #ffe08a, #ff9bb0);
      color: #2b104d;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 18px rgba(255, 180, 200, 0.7);
    }

    button:hover {
      transform: scale(1.08);
      background: white;
    }

    #message {
      margin-top: 22px;
      font-size: 19px;
      color: #fff;
      line-height: 1.9;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 22px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎂 كل سنة وانتي طيبة يا أسماء 🎉</h1>

    <p>
      يوم <b>14 / 8</b> يوم ميلادك ❤️<br>
      وهتكملي فيه <b>19 سنة</b>.
    </p>

    <p class="age">✨ Happy Birthday Asmaa ✨</p>

    <button onclick="showMessage()">افتحي الرسالة</button>

    <div id="message"></div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "كل سنة وانتي طيبة يا أسماء ❤️<br><br>" +
        "ربنا يجعل عامك الـ 19 سنة ستر ورضا وراحة بال، ويكتبلك فيها الخير في كل خطوة.<br><br>" +
        "ربنا يرزقك نجاح يفرحك، ودعوة مستجابة، وفرحة تملي قلبك، ويبعد عنك أي حزن أو ضيق.<br><br>" +
        "وجودك بالنسبالي مميز، وكنت مبسوط بكل كلام بينا حتى لو كان كتير أوقات.<br><br>" +
        "حبيت أقولك ده في يوم ميلادك من غير ما أطوّل… انتي شخص غالي فعلًا، وكل سنة وانتي بخير ✨";
    }

    function createHeart() {
      var heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 18 + 16 + "px";
      heart.style.animationDuration = Math.random() * 3 + 4 + "s";

      document.body.appendChild(heart);

      setTimeout(function() {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 350);
  </script>

</body>
</html>
