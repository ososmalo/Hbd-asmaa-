<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عيد ميلاد أسماء</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #090014 0%, #2b104d 45%, #ff9a5c 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
    }

    .sun {
      position: absolute;
      bottom: -120px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, #fff3a3, #ffb347, #ff6f61);
      border-radius: 50%;
      box-shadow: 0 0 80px #ffb347, 0 0 150px #ff6f61;
      animation: rise 5s ease-out forwards;
    }

    .card {
      width: 85%;
      max-width: 460px;
      padding: 35px 25px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 0 35px rgba(255, 190, 120, 0.5);
      backdrop-filter: blur(12px);
      animation: appear 1.5s ease;
      z-index: 2;
      border: 1px solid rgba(255, 220, 170, 0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px #ffd27d;
    }

    .age {
      font-size: 25px;
      color: #ffe08a;
      font-weight: bold;
      text-shadow: 0 0 12px #ffb347;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
    }

    button {
      margin-top: 20px;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #ffe08a, #ff9a5c);
      color: #2b104d;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 18px rgba(255, 190, 120, 0.7);
    }

    button:hover {
      transform: scale(1.08);
      background: white;
    }

    #message {
      margin-top: 22px;
      font-size: 19px;
      color: #fff;
      line-height: 1.9;
    }

    .star {
      position: absolute;
      color: #fff4b8;
      font-size: 18px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes rise {
      from {
        bottom: -180px;
        opacity: 0.5;
      }
      to {
        bottom: -70px;
        opacity: 1;
      }
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-20vh);
        opacity: 0;
      }
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="sun"></div>

  <div class="card">
    <h1>🌅 كل سنة وانتي طيبة يا أسماء 🎂</h1>

    <p>
      يوم <b>14 / 8</b> مش مجرد يوم عادي،<br>
      ده يوم ميلادك، وبداية سنة جديدة طالعة زي الفجر.
    </p>

    <p class="age">✨ 19 سنة من النور ✨</p>

    <button onclick="showMessage()">افتحي الرسالة</button>

    <div id="message"></div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "كل سنة وانتي طيبة يا أسماء ❤️ أتمنى سنة الـ 19 تكون سنة بازغة وجميلة عليكي، سنة تبدأ بهدوء الفجر وتنور أيامك واحدة واحدة. أتمنى ليكي فرح كتير، وراحة بال، ونجاح، وضحكة ما تغيبش. وبصراحة وجودك دايمًا كان ليه نور مختلف في يومي، وكنت فرحان بكل كلام بينا حتى لو كان كتير شوية. مش عايز أقول حاجة تقيلة في يوم عيد ميلادك، بس حبيت أقولك إنك شخص مميز فعلًا، ويارب السنة الجديدة تكون شبه النور اللي تستاهليه ✨🌅";
    }

    function createStar() {
      var star = document.createElement("div");
      star.className = "star";
      star.innerHTML = "✦";
      star.style.left = Math.random() * 100 + "vw";
      star.style.fontSize = Math.random() * 18 + 14 + "px";
      star.style.animationDuration = Math.random() * 3 + 4 + "s";

      document.body.appendChild(star);

      setTimeout(function() {
        star.remove();
      }, 7000);
    }

    setInterval(createStar, 300);
  </script>

</body>
</html>
