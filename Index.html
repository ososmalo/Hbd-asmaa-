<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عيد ميلاد أسماء</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #12001f, #ff4ecd);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
    }

    .card {
      width: 85%;
      max-width: 430px;
      padding: 35px 25px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 35px rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      animation: appear 1.5s ease;
      z-index: 2;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px #fff;
    }

    .age {
      font-size: 24px;
      color: #ffdf6c;
      font-weight: bold;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
    }

    button {
      margin-top: 20px;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: #ffdf6c;
      color: #2b003b;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      background: white;
    }

    #message {
      margin-top: 22px;
      font-size: 19px;
      color: #fff;
      line-height: 1.8;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 25px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎂 كل سنة وانتي طيبة يا أسماء 🎉</h1>

    <p>
      النهارده مش يوم عادي، ده يوم ميلادك يا أسماء ❤️<br>
      يوم <b>14 / 8</b> هتكملي <b>19 سنة</b>.
    </p>

    <p class="age">✨ Happy Birthday Asmaa ✨</p>

    <button onclick="showMessage()">اضغطي هنا</button>

    <div id="message"></div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "كل سنة وانتي طيبة يا أسماء ❤️ أتمنى سنة الـ 19 تكون سنة جميلة عليكي، مليانة فرح ونجاح وراحة بال. بصراحة كنت عايز أقولك حاجة من قلبي… أنا معجب بيكي يا أسماء، وبشخصيتك وطريقتك ووجودك. وكنت عارف إنك في وقت من الأوقات كنتي مخنوقة شوية من إننا بنتكلم كتير، بس أنا كنت فرحان بده… فرحان إني بكلمك، وفرحان بوجودك في يومي، يمكن عشان وجودك كان بيخليني مبسوط من غير ما أحس. مش بقول الكلام ده عشان أضغط عليكي أو أخليكي تردي بطريقة معينة، أنا بس حبيت أكون صريح معاكي وأقولك إنك شخص مميز جدًا بالنسبالي ✨";
    }

    function createHeart() {
      var heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 18 + "px";
      heart.style.animationDuration = Math.random() * 3 + 4 + "s";

      document.body.appendChild(heart);

      setTimeout(function() {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 350);
  </script>

</body>
</html>
